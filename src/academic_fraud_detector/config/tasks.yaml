# ── Phase 2b: New Detection Dimensions ──

methodology_audit:
  description: >
    ## 任务：方法论一致性审查

    审查论文实验方法部分的内部一致性和逻辑合理性。这是"第六式：方法矛盾检测"
    的核心 — 很多造假论文的方法部分经不起仔细推敲。

    ### 本地 PDF 预加载正文（必须优先使用）

    系统已在启动前提取 PDF 正文。local_paper_load_status={local_paper_load_status}。
    如果状态为 success，必须从以下正文中定位 Methods、Results、图注、伦理声明和试剂/设备信息；
    不得因为缺少外部数据库元数据而跳过方法论审查。

    {local_paper_text}

    ### 方法

    1. **试剂/设备型号真实性校验**（必须执行）：
       - 从 Methods 中提取所有试剂名称、货号（Cat#）、设备型号。
       - **双重验证策略**：
         a) 工具验证：使用 `reagent_verification` 工具校验 Cat# 格式
         b) **LLM 直接推理（极其重要！）**：
            - 你拥有海量生物医学知识，可以直接判断：
              * 这个试剂品牌/货号是否真实存在？
              * 某种抗体是否有对应的克隆号（如 β-actin 抗体通常用 AC-15 或 8H10D10）？
              * 某个细胞系是否真的来自 ATCC（如 HEK293T 的 ATCC 编号为 CRL-3216）？
              * 某个设备型号是否是该厂商的已知产品线？
            - 如果某个试剂/设备的组合在你的知识中不存在或明显矛盾，
              直接标记为可疑 — 不需要工具验证。
         c) 联网验证（非 local_only 模式）：使用 `academic_web_search` 搜索试剂/设备
       - 重点检查：抗体克隆号、化学试剂纯度编号、试剂盒型号
       - 红旗信号：编造的货号通常看起来"格式正确但不存在" —
         正则工具无法检测这类造假，只有 LLM 知识和联网搜索能发现！

    2. **伦理审批号格式校验**（如果论文涉及动物/人体实验，必须执行）：
       - 使用 `ethics_approval_check` 工具校验伦理审批号格式
       - 各国格式参考：
         * 中国：通常为"机构缩写-IACUC-年份-编号"或"伦审(年份)第XX号"
         * 美国：通常包含 IACUC 编号或 IRB 协议号
         * 欧盟：通常包含 Directive 2010/63/EU 引用
       - 标记格式明显异常或缺失的审批号

    3. **实验时间线合理性**（如果可获得投稿/接收日期，必须执行）：
       - 使用 `experimental_timeline_check` 工具
       - 从 Methods 中提取声称的实验持续时间和动物年龄
       - 与投稿日期对比：
         * 实验结束日期是否晚于投稿日期？（不可能！）
         * 声称使用投稿时尚未上市的试剂/设备？
         * 实验周期是否短得不合理？（如"6月龄小鼠造模6个月"但投稿时小鼠才8月龄）
       - 标记任何时间冲突

    4. **Methods 内部自洽性**（必须执行，纯 LLM 推理）：
       - 使用 `method_internal_consistency` 工具
       - 检查以下一致性：
         * n 值声明：前面说 n=5/组，后面表格只有 4 个数据点
         * 组数一致性：说分 4 组，但只报告了 3 组的结果
         * 性别/年龄一致性：动物部分说雄性，后面结果部分出现雌性数据
         * 条件描述矛盾：说给的是药物 X 10mg/kg，后面写的是 20mg/kg
         * 统计方法矛盾：Methods 说用 ANOVA，Results 报告的是 t-test
       - 这类矛盾在造假论文中非常常见 — 造假者在编造数据时会忘记 Methods 中
         的设定。

    5. **实验设计逻辑检查**（LLM 推理）：
       特别注意以下红旗信号：
       - **动物实验违背 3R 原则**：如双眼同时造模（违反 Refinement 原则、
         无法做对侧自身对照）
       - **细胞实验中不可能的培养条件**：如"37°C 5% CO₂ 培养 72h"但
         培养基在 72h 不换液会导致细胞死亡
       - **试剂剂量不切实际**：如给药剂量远超药物的 LD50
       - **结果与方法的生物学矛盾**：如用"普通 DMEM"培养"原代神经元"
         （原代神经元需要特殊培养基 Neurobasal+B27）

    ### 目标论文
    {paper_identifier}
  expected_output: >
    JSON 格式报告（所有文本字段使用中文）：

    {
      "category": "methodology_consistency",
      "severity": "无风险|低风险|中风险|高风险|严重风险",
      "confidence": "低|中|高",
      "summary": "2-5句中文叙述性总结",
