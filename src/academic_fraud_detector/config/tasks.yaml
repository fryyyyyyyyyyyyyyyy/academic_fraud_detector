        "findings": [
          {
            "type": "n值矛盾|组数矛盾|条件矛盾|统计方法矛盾|性别/年龄矛盾|其他",
            "location": "Methods/Results 中的具体位置",
            "description": "中文详细描述前后矛盾之处",
            "severity": "严重|高|中|低"
          }
        ]
      },
      "experimental_design_logic": {
        "issues_found": ...,
        "findings": [
          {
            "type": "3R原则违背|不可能培养条件|不合理剂量|生物学矛盾|其他",
            "detail": "中文详细说明",
            "severity": "严重|高|中|低"
          }
        ]
