      "total_checks": ...,
      "flagged_checks": ...
    }
  agent: image_forensics_analyst
  context: [acquire_target_paper]

data_integrity_investigation:
  description: >
    ## 任务：统计数据完整性审计

    分析目标论文中报告的数值数据，寻找数据造假或操纵的统计痕迹。

    ### 🔴🔴 预比对结果（系统已确定性执行完毕！直接使用，不要重新调用工具！）🔴🔴

    系统已在启动前**确定性地完成了以下所有步骤**：
    1. ✅ 所有柱状图的数值提取（bar_chart_extract_values）
    2. ✅ 跨图数据比对（cross_figure_data_compare）
    3. ✅ PDF文本中所有数值的提取（均值、SD、p值、百分比等）
    4. ✅ 本福特定律检验
    5. ✅ p值分布分析（卡尺检验 + 均匀性检验）
    6. ✅ GRIM检验
    7. ✅ 异常精度检测（CV分析 + 末位数字偏好 + 近等差数列检测 + 高频重复值检测）

    **这些检验已经全部执行完毕，结果在下方。你不需要、也不应该再调用任何工具
    来重复这些检验。你的唯一任务是将这些结果忠实地转录到最终报告中。**

    以下是完整的预计算结果：

    {cross_figure_precheck}

    预比对原始 JSON（用于核对 datasets、matches、统计预检字段）：

    {cross_figure_precheck_json}

    PDF 预加载提取的表格、统计值和解析状态如下（必须优先使用）：

    {local_paper_stats_json}

    ### 🚨 关键评分规则（必须严格遵守）

    **你已经收到了系统预计算的所有统计检验结果。评分必须反映这些实际结果：**

    | 预计算发现 | 数据完整性评分 |
    |-----------|---------------|
    | CRITICAL 跨图匹配（shared_group_exact_match/exact_match） | **90-100** |
    | HIGH 跨图匹配（near_match） | **75-85** |
    | 近等差数列检测标记（severity=critical/high） | **70-85** |
    | 末位数字严重偏好（末位5或0占比>25%） | **+15到现有评分** |
    | 高频重复值标记 | **+15到现有评分** |
    | Benford MAD>0.015 或 p<0.05 | **60-80** |
    | p值卡尺比率>2.0 | **60-75** |
    | GRIM不一致（数学上不可能） | **85-100** |
    | 仅CV异常（CV<1%） | **45-60** |
    | 仅末位数字轻度偏好（15-20%） | **35-50** |
    | **以上全部阴性 + 文本提取到足够数值** | **10-20** |
    | **以上全部阴性 + 确实提取不到任何数值** | **5-15** |

    ### 🚨 禁止行为（违反即视为检测失败）

    - ❌ **严禁写"因数据不足/数据格式不兼容，检验未执行"** — 检验已经由系统执行了！
    - ❌ **严禁写"p值仅以阈值形式报告"来跳过分析** — 系统已从PDF文本和图表中
      提取了所有可用数值，结果就在上面的预比对结果中。
    - ❌ **严禁给出5分的评分除非确实所有检验（包括等差数列、末位数字、高频重复、
      跨图比对）全部阴性**。
    - ❌ **严禁忽略近等差数列检测的结果** — 如果预比对结果中标记了任何序列的
      CV_diff<0.10，这是人为编造数据的最强信号，必须报告！
    - ❌ **严禁忽略末位=5的高频出现** — 如果预比对结果中末位5占比>15%，
      必须在报告中明确列出这个发现。
    - ✅ **必须在报告的"数据完整性分析"部分逐项列出所有预计算的检验结果**，
      包括那些结果为阴性的检验（写"检验执行完毕，未发现异常"，而非"未执行"）。

    ### 数据可用性说明

    系统已从以下来源提取了数据：
    - PDF文本层：通过正则表达式提取所有数值（均值、SD、p值、百分比、样本量）
    - 柱状图图片：通过计算机视觉测量柱高度并插值计算实际数值
    - 如果论文确实以 "*P<0.05" 形式报告显著性（这在生物医学论文中很常见），
      则精确p值分布分析可能受限 — 但这**不代表数据完整性分析整体失败**，
      因为系统还从图表和文本中提取了大量其他数值数据供其他检验使用。

    ### 目标论文
    {paper_identifier}
  expected_output: >
