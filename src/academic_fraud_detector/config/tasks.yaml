      "category_risk_score": 0-100,
      "total_checks": ...,
      "flagged_checks": ...
    }
  agent: image_forensics_analyst
  context: [acquire_target_paper]

data_integrity_investigation:
  description: >
    ## 任务：XLSX 原始数据完整性审计

    分析目标论文 PDF 与本地 XLSX 原始数据，寻找数据造假或操纵的客观统计痕迹。

    ### 🔴 确定性预检结果（系统已在启动前执行）

    以下预检由代码层确定性执行，不依赖大模型主观判断。你不需要、也不应该重新调用
    图像 OCR、柱状图提取或图像相似度工具；当前本地流程不做任何图片处理。

    #### 案例材料清单

    {case_manifest_json}

    #### PDF 文本/表格提取状态

    {local_paper_stats_json}

    #### XLSX 原始数据文件

    {raw_data_files_json}

    #### XLSX 数据集概况

    {raw_data_profile_json}

    #### 原始数据确定性预检摘要

    {raw_data_precheck}

    #### 原始数据确定性预检完整 JSON

    {raw_data_precheck_json}

    #### 论文 claim anchor（代码确定性抽取，供回到论文语境定位）

    {paper_claims_json}

    #### 论文统计值 ↔ XLSX 候选对齐 seed

    {evidence_cross_validation_json}

    #### 可报告结论白名单（allowed_claims）

    {allowed_claims_json}

    ### 🚨 防主观臆断规则（必须严格遵守）

    - 只能报告 deterministic_evidence_json / raw_data_precheck_json 中已经存在的证据。
    - 每条风险结论必须引用 evidence_id、文件名、sheet、range、检测方法和统计量。
    - 禁止根据作者身份、论文题目、研究方向、措辞、直觉或视觉印象推断造假。
    - 禁止写任何图像取证、图像 OCR、柱状图 OCR 或图片相似度发现。
    - 如果没有 high/critical 证据，必须明确写“未发现高置信度确定性数据造假证据”。
    - 如果 raw_data_files_json 为空，说明当前是 PDF-only 本地模式，不能声称完成 XLSX 原始数据审计。
    - 统计异常不等于单独证明造假；必须列出可能的非造假解释和人工复核建议。
    - paper_claims_json 只是论文原文定位锚点，不是风险证据；只能用于说明 evidence_id 可能对应的论文位置。
    - evidence_cross_validation_json 是确定性候选 seed；ambiguous/no_candidate/unverifiable 只能写为人工复核或局限性。

    ### 必须覆盖的证据类型

    若预检 JSON 中存在以下 evidence_type，必须逐条转录并解释：
    - approximate_arithmetic_sequence：近似等差数列，说明 diff_cv、R²、order_mode。
    - raw_numeric_similarity：重复/相似数据，说明同序、乱序、子集或线性变换类型。
    - decimal_suffix_overrepresentation / decimal_suffix_reuse_across_datasets：小数后缀异常。
    - last_digit_overrepresentation / last_digit_absence / last_digit_distribution_chisquare：
      小数最后一位异常，必须写出 binomial/chi-square/occupancy 概率。
    - reported_statistic_mismatch 或 paper_raw_data_alignment 相关内容：论文统计量与原始数据核验。

    ### 目标案例
    {paper_identifier}
  expected_output: >
    JSON 格式报告（所有文本字段必须使用中文描述）：

    {
      "category": "raw_data_fabrication",
      "severity": "无风险|低风险|中风险|高风险|严重风险",
      "confidence": "低|中|高",
      "summary": "2-5句中文总结，只基于确定性证据",
      "raw_data_profile": {
        "file_count": ..., "sheet_count": ..., "dataset_count": ..., "numeric_value_count": ...
      },
