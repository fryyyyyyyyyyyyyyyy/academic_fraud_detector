# ═══════════════════════════════════════════════════════════════════════════
# Task Configuration
# ═══════════════════════════════════════════════════════════════════════════
#
# 7 tasks forming a complete investigation pipeline.
#
# Flow:
#   acquire_target_paper  (obtain paper metadata and content)
#       │
#       ├── plagiarism_investigation        (parallel)
#       ├── image_forensics_investigation   (parallel)
#       ├── data_integrity_investigation    (parallel)
#       ├── citation_network_investigation  (parallel)
#       └── peer_review_investigation       (parallel)
#       │
#       └── synthesize_findings  (depends on ALL above)
#
# The Hierarchical process allows the Lead Investigator to dynamically
# delegate tasks, adjust investigation depth based on findings, and
# request additional analysis when evidence is ambiguous.
# ═══════════════════════════════════════════════════════════════════════════

# ── Phase 1: Paper Acquisition ──

acquire_target_paper:
  description: >
    ## 任务：获取目标论文的元数据和内容

    获取被调查论文的完整元数据和尽可能多的全文内容。

    ### 如果 identifier_type 是 "local_pdf"：
    论文为本地 PDF 文件。系统已在任务启动前确定性运行 `local_paper_loader`，
    请首先使用以下预加载结果，不要重复调用工具，除非状态为 error 或 JSON 明显缺失关键字段。

    - local_paper_load_status: {local_paper_load_status}
    - local_paper_load_error: {local_paper_load_error}
    - local_paper_summary: {local_paper_summary}

    预加载 JSON（必须保留其中的 full_text、images、panels、tables、pre_extracted_stats、mineru 字段）：

    {local_paper_payload_json}

    你的任务是将上述 JSON 整理为下方 expected_output 的结构化结果，并确保下游任务能看到：
    1. 全文 Markdown/文本（`full_text`）。
    2. 所有本地图片路径（`images[*].filepath`，包括 MinerU 缓存图片和 PyMuPDF 图片）。
    3. 所有独立面板路径（`panels`）。
    4. 所有表格和预提取统计数据（`tables`、`pre_extracted_stats`）。
    5. MinerU 解析状态和缓存路径（`mineru`）。
    **切勿调用外部 API 工具**（arxiv_search、crossref_search、semantic_scholar_search）。

    ### 如果 identifier_type 不是 "local_pdf"：
    1. 使用 {paper_identifier} 和 {identifier_type} 识别论文。
    2. 通过 arXiv、CrossRef 和 Semantic Scholar 搜索获取完整元数据。
    3. 如 API 无法获取全文，尝试下载 PDF 并用 PyMuPDF 提取文本。
    4. 将所有元数据整理为结构化格式。

    ### 输入
    - paper_identifier: {paper_identifier}
    - identifier_type: {identifier_type}

    ### 成功标准
    - 论文已高置信度识别（标题/作者匹配正确）
    - 获得摘要和作者列表
    - 全文已提取或标注为不可用
    - 参考文献列表已提取
  expected_output: >
    结构化 JSON 对象（文本字段使用中文）：
    {
      "title": "论文标题",
      "authors": ["作者1", "作者2"],
      "abstract": "中文摘要或原文摘要",
      "year": 年份,
      "journal": "期刊/会议名",
      "doi": "DOI",
      "identifiers": { "arxiv": "...", "s2": "...", "doi": "..." },
      "full_text_available": true/false,
      "full_text": "全文内容" 或 null,
      "figures": [{"number": 1, "caption": "图注", "url": "路径或URL"}],
      "images": [{"filename": "...", "filepath": "本地图片路径", "source": "mineru|pymupdf", "width": ..., "height": ...}],
      "panels": ["本地独立面板路径1", "本地独立面板路径2"],
      "tables": [{"number": 1, "caption": "表注", "rows": [...], "columns": [...]}],
      "pre_extracted_stats": {"p_values": [...], "means_and_sds": [...], "numeric_values": [...]},
      "mineru": {"used": true/false, "cache_dir": "...", "full_md_path": "...", "image_count": ...},
      "references": [{"title": "...", "doi": "...", "authors": [...]}],
      "citation_count": 数字,
      "source_apis_used": ["arxiv", "crossref", "semantic_scholar"],
      "retrieval_notes": "中文检索备注"
    }
  agent: plagiarism_detective
  context: []

# ── Phase 2: Parallel Specialist Investigations ──

plagiarism_investigation:
  description: >
    ## 任务：全面抄袭检测

    对目标论文进行彻底的抄袭检查。

    ### 方法
    1. **提取关键段落**：摘要、引言、方法、结果、讨论。聚焦实质性内容，跳过参考文献和致谢。

    2. **寻找候选源文献**：使用 arXiv、CrossRef、Semantic Scholar 搜索相似段落和标题。
       包括同作者论文（检查自我抄袭/重复发表）。优先目标论文发表之前的文献。

    3. **逐篇比对**（最多 20 篇最有希望的候选）：
       - `semantic_similarity_check` 检测改写抄袭。
       - `lexical_plagiarism_check` 检测逐字复制。
       - 标记：语义相似度 > 0.80 或词法比例 > 0.60。

    4. **评估严重程度**：
       - 逐字复制 → 严重
       - 拼凑抄袭 → 高
       - 改写抄袭 → 中
       - 自我抄袭 → 中（视上下文）

    5. **提取证据**：每项匹配附带源文献引用、对齐文本段落、相似度分数和论文中位置。

    6. **计算总体抄袭严重度**：基于最严重发现和不同来源数量。

    ### 目标论文
    {paper_identifier}
  expected_output: >
    JSON 格式报告（所有文本字段使用中文）：

    {
      "category": "plagiarism",
      "severity": "无风险|低风险|中风险|高风险|严重风险",
      "confidence": "低|中|高",
      "summary": "2-5句中文叙述性总结",
      "checks_performed": {
        "candidate_sources_searched": ..., "papers_compared": ..., "total_similarity_checks": ...
      },
      "findings": [
        {
          "source_paper": { "title": "...", "authors": [...], "doi": "...", "year": ... },
          "similarity_type": "逐字复制|拼凑抄袭|改写抄袭|自我抄袭|翻译抄袭",
          "semantic_similarity": 0.95, "lexical_ratio": 0.72,
          "matched_passages": [
            { "target_text": "...", "source_text": "...", "location_in_target": "第3.2节" }
          ],
          "severity": "严重|高|中|低", "confidence": "高|中|低"
        }
      ],
      "category_risk_score": 0-100, "total_checks": ..., "flagged_checks": ...
    }
  agent: plagiarism_detective
  context: [acquire_target_paper]

image_forensics_investigation:
  description: >
    ## 任务：图像取证调查

    **🚨 最高优先级 — 防捏造规则（违反即视为检测失败）🚨**

    你有6个专业取证工具可用（error_level_analysis, clone_detection, ai_image_detection,
    background_consistency_check, cross_image_duplicate_check, feature_based_duplicate_check）。

    ### 防捏造铁律：
    1. **工具输出是唯一证据**。你不得凭 LLM 视觉能力判断图片是否造假。
       "看起来相似"、"视觉上一致"、"疑似相同"等主观判断 = 无效。
       只有工具返回 `"flagged": true` 或具体数值匹配才有证据意义。

    2. **阴性必须如实报告**。如果全部工具返回阴性（`"flagged": false`），
       必须明确写"经N项工具检测，未发现图像篡改证据"。
       严禁在工具全部阴性时仍然罗列"可疑发现"。

    3. **每条发现必须引用工具输出**。格式："工具 X 对图 Y 的检测返回：
       flagged=true, 具体数值=...（工具原始输出）。判定：..."
       没有工具输出引用的"发现"将被事实核查环节剔除。

    4. **跨图重复必须有精确数值**。声称"图A与图B匹配"必须附带：
       匹配工具名称 + 匹配类型（exact_match/subset_match） + 具体匹配值。
       例如："cross_image_duplicate_check 返回 Figure1_panel0 与 Figure4_panel0
       匹配，Hamming distance=2, transform=rot_90"。
       没有具体工具名称和精确数值的跨图匹配 = 无效。

    5. **工具无法执行 ≠ 检测通过**。如实区分三种状态：
       - ✅ 已检测无异常（工具返回 flagged=false）
       - ⚠️ 因技术原因无法检测（工具报错/图片质量问题）
       - 🔴 检测到异常（工具返回 flagged=true + 具体数值）

    6. **调用顺序**：先单图取证（ELA → 克隆检测 → AI检测 → 背景一致性），
       再跨图比对（整图pHash → 面板SIFT）。

    分析目标论文中所有图表、图像和图形数据，检测是否存在篡改或伪造。

    ### 本地 PDF 预加载图像输入（必须优先使用）

    系统已在启动前解析 PDF，并提取本地图片和面板路径：

    - images JSON: {local_paper_images_json}
    - panels JSON: {local_paper_panels_json}

    如果上述 JSON 中包含图片或面板路径，禁止报告“图像数为 0”或“未获得图像路径”。
    必须优先使用这些 `filepath` / panel 路径调用图像取证工具；只有在 JSON 为空或路径无法读取时，
    才能说明图像输入缺失，并应引用具体错误。

    ### 🔴 图像取证工具预检结果（系统已确定性执行，必须优先采用）

    为避免 Agent 只描述方法但未实际调用工具，系统已在代码层面预先调用图像取证工具，
    并把工具返回的原始 JSON 注入到本任务。你必须先读取这些结果；不得再写“当前环境未提供
    可调用的图像取证工具接口”。

    预检摘要：

    {image_forensics_precheck}

    预检原始 JSON（用于核对每个工具的 status、flagged、match_count、raw output 和覆盖范围）：

    {image_forensics_precheck_json}

    使用规则：
    - 如果预检 JSON 中某个工具 status=success，说明该工具已经实际执行；必须引用其 output。
    - 如果 status=error，说明工具被调用但执行报错；必须报告具体 error，不能当作阴性结果。
    - 如果 status=skipped 或 coverage 显示存在 omitted 项，必须说明覆盖范围和未覆盖数量。
    - 只有工具 output.flagged=true 或 matches 非空时，才可形成阳性图像证据。
    - 如果预检已覆盖的工具全部 flagged=false，可写“已执行工具未发现异常”；不得写“未执行”。

    ### 方法
    1. **清点**：从论文元数据提取所有图像/图表 URL。如果论文有 PDF，提取嵌入的图片。
       统计并编目所有图表。注意：PDF 加载后，`panels` 字段包含已自动分割的独立面板路径，
       这些面板是从复合图中拆分出来的子图。

    2. **读取图像路径**：本地 PDF 模式不要下载图像，直接使用预加载 JSON 中的本地 `filepath`
       和 panel 路径；如果是远程 URL，只能使用当前 Agent 已注册的图像工具自行读取 URL，不要声称存在
       未注册的 `image_downloader` 工具。

    3. **对每张图像执行以下分析**：
       a) **误差水平分析 (ELA)**：检测 JPEG 压缩差异导致的编辑痕迹。使用 `error_level_analysis` 工具。
       b) **克隆检测**：发现同一图像内的复制-粘贴区域。可检测重复的 Western blot 条带、
          复制粘贴的细胞。使用 `clone_detection` 工具。
       c) **AI 图像检测**：通过噪声和频域分析检测 AI 生成/合成图像。使用 `ai_image_detection` 工具。
       d) **背景一致性检测**：将图像分为泳道/区域，比较背景噪声、亮度和纹理。
          检测来自不同凝胶的泳道被拼贴到一起。使用 `background_consistency_check` 工具。

    4. **跨图交叉比对（关键步骤，必须执行！）**：
       **第一轮 — 整图级比对**：使用 `cross_image_duplicate_check` 工具传入所有图像路径。
       检测同一图像被旋转（90/180/270°）或翻转（水平/垂直）后在不同图中重复使用。

       **第二轮 — 面板级比对（极其重要！新功能）**：
       如果 PDF 加载结果中包含 `panels` 字段（独立面板路径列表），必须执行此步骤：
       - 使用 `feature_based_duplicate_check` 工具，传入所有面板路径。
       - 此工具使用 SIFT 特征点匹配 + RANSAC 几何验证，能检测到：
         * 局部重叠（同一组织切片的不同裁剪区域）
         * 缩放变化（不同放大倍数下的同一区域）
         * 小角度旋转（不仅限于 90° 倍数）
         * 部分拼接复用
       - **参数建议（针对生物/医学图像）**：
         * min_inliers=8（HE 染色/组织切片等重复纹理图像用更低的阈值）
         * ratio_threshold=0.80（对重复性细胞纹理放宽 Lowe's ratio test）
         * sift_contrast_threshold=0.02（低对比度生物图像检测更多关键点）
       - 这是检测 "Figure 1D 的部分区域在 Figure 4A 中重复出现" 这类造假的
         核心工具。之前的 pHash 整图比对会遗漏此类造假！
       - **注意**：免疫荧光图通常有黑色背景，确定面板拆分是否正确（面板应被正确分离）

    5. **同一图内面板比对**：
       使用 `feature_based_duplicate_check` 在同一张图的不同面板之间进行比对。
       如果同一张复合图的两个面板有极高的 SIFT 匹配（>100 inliers, near_identical），
       说明同一图像在同一张图中被多次使用 — 强烈的造假信号。

    6. **标记并记录**每张可疑图像：
       - 检测到的篡改类型（复制粘贴、拼接、擦除、AI 生成等）
       - 异常所在位置（坐标/区域）
       - 发现的统计置信度
       - 检测出问题的具体工具
       - 如果是跨面板匹配，记录匹配的两个面板及其关系

    ### 目标论文
    {paper_identifier}
  expected_output: >
    JSON 格式报告（所有文本字段必须使用中文描述）：

    {
      "category": "image_manipulation",
      "severity": "无风险|低风险|中风险|高风险|严重风险",
      "confidence": "低|中|高",
      "summary": "2-5句中文叙述性总结",
      "total_images": ...,
