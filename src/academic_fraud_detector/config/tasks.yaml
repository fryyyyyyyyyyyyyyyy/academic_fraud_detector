          {
            "claim": "原文中的引用句",
            "cited_paper": "被引论文信息",
            "web_search_result": "搜索结果摘要",
            "llm_reasoning": "基于你的知识判断该引用是否合理",
            "verdict": "有效|可疑|编造"
          }
        ]
      },
      "findings": [{ "detail": "中文详细描述", "severity": "..." }],
      "category_risk_score": 0-100, "total_checks": ..., "flagged_checks": ...
    }
  agent: citation_network_investigator
  context: [acquire_target_paper]

peer_review_investigation:
  description: >
    ## 任务：同行评审诚信调查

    调查目标论文的同行评审过程，寻找评审欺诈或诚信受损的证据。

    ### 方法
    1. **评估数据可用性**：检查是否有公开的审稿意见。如无可用的审稿文本，使用间接指标。

    2. **如审稿文本可用**：使用 `review_text_analyzer` 和 `review_template_detector` 分析审稿质量、
       检测模板复用和虚假审稿。

    3. **审稿人资质验证**（如审稿人身份已知）：检查发表记录、邮箱类型、领域相关性。

    4. **间接指标**（审稿数据不公开时）：期刊审稿政策、接收时间线、特刊风险、编辑利益冲突。

    5. **透明记录局限性**：明确说明因数据访问限制无法检查的内容。

    ### 目标论文
    {paper_identifier}
  expected_output: >
    JSON 格式报告（所有文本字段使用中文）：

    {
