            "first_author_papers": ...,
            "corresponding_papers": ...,
            "papers_per_year": ...,
            "assessment": "正常|偏高|异常",
            "detail": "中文说明"
          }
        ],
        "flagged": true/false
      },
      "salami_slicing": {
        "suspicious_groups": [
          {
            "papers": ["...", "..."],
            "shared_characteristics": "对照组数据相同|实验设计高度相似|样本量相同",
            "interpretation": "中文解释"
          }
        ],
        "flagged": true/false
      },
      "findings": [
        { "type": "methods雷同|发表频率异常|salami_slicing", "detail": "...", "severity": "..." }
      ],
      "api_limitations": ["PubMed API 限流", "无法获取完整作者发表记录"],
      "category_risk_score": 0-100,
