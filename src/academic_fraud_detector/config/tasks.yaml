        }
      ],
      "tool_invocations": [
        {
          "tool_name": "error_level_analysis|clone_detection|ai_image_detection|background_consistency_check|cross_image_duplicate_check|feature_based_duplicate_check",
          "status": "success|error|skipped",
          "input_summary": "图片/面板路径或数量",
          "flagged": true,
          "raw_output_excerpt": "工具原始 JSON 的关键字段"
        }
