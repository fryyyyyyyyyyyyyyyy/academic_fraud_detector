local_synthesize_findings:
  description: >
    ## 任务：汇总调查结果并生成最终中文 Markdown 报告（本地 PDF 模式）

    将已完成的三项专业调查（图像取证 + 数据完整性审计 + 方法论审查）的结果整合为一份
    结构清晰、可直接阅读的中文 Markdown 报告。

    **重要**：这是本地 PDF 调查模式。执行了图像取证、数据完整性检查和方法论一致性审查。
    引用网络分析和同行评审调查均未执行（需外部 API）。
    切勿为缺失的类别编造发现 — 如实标注为"未调查"并说明原因。

    ### 本地 PDF 加载状态核查（必须执行）

    - local_paper_load_status: {local_paper_load_status}
    - local_paper_load_error: {local_paper_load_error}
    - local_paper_summary: {local_paper_summary}
    - images: {local_paper_images_json}
    - panels: {local_paper_panels_json}
    - image_forensics_precheck: {image_forensics_precheck}
    - image_forensics_precheck_json: {image_forensics_precheck_json}

    如果 local_paper_load_status 为 success，且 images/panels 非空，最终报告不得写“无法访问本地 PDF”或
    “未获得图像路径”。如果图像取证预检 JSON 中存在 tools_attempted，最终报告不得写“图像取证工具未实际执行”或
    “当前环境未提供可调用工具接口”；应按 status 区分 success/error/skipped，并引用预检 JSON 的工具输出。

    ### 🚨 交叉验证步骤（必须在评分前执行）

    在读入各 Agent 报告后，你必须对每项发现执行以下验证：

    1. **图像取证发现验证**：
       - 对于每项图像相关发现，检查是否附带了**具体工具名称**和**工具返回的客观数据**。
       - ✅ 有效证据："cross_image_duplicate_check 返回 Figure1_panel0 与 Figure4A_panel0
         匹配，Hamming distance=2, confidence=very_high"
       - ❌ 无效证据："图1和图4看起来相似"、"经视觉比对发现"、"疑似同一图片" → 标记为
         "证据不足，从报告中剔除"
       - 必须同时核对 `image_forensics_precheck_json`：如果其中已有 tools_attempted，说明工具已在
         代码层实际调用，最终报告应转录 success/error/skipped 状态和覆盖范围。
       - 如果图像取证报告没有正确使用预检结果，你必须用 `image_forensics_precheck_json` 纠正它，
         不得沿用“工具未执行/接口不可用”的错误说法。
       - 只有在工具实际返回 flagged=false 且无 matches 时，才能说明“已执行工具未发现异常”；
         如果工具 status=error 或 skipped，只能作为流程限制说明，不能当作阴性证据。

    2. **数据完整性发现验证**：
       - ⚠️ **系统已在代码层面确定性执行了所有统计检验**（Benford、p值分布、
         GRIM、异常精度、末位数字、近等差数列、高频重复值、跨图数据比对）。
       - 检查数据完整性报告是否完整转录了所有预计算结果。如果报告写了
         "因数据不足未执行"但预比对结果中有实际数据 → **这是 Agent 的错误，
         必须纠正**。
       - 确认跨图数据比对结果（尤其是 CRITICAL 和 HIGH 匹配）已被纳入报告。
       - 确认近等差数列检测结果已被纳入报告（不得省略）。
       - 确认末位数字偏好分析（末位=5和末位=0的占比）已被纳入报告。

    3. **方法论发现验证**：
       - 检查 reagent_verification 和 method_internal_consistency 工具是否被实际调用。
       - LLM 基于知识的推理必须标注为"基于LLM知识的判断，需人工验证"。

    ### 输入
    你将收到以下完整输出：
    - 图像取证调查报告
    - 数据完整性审计报告
    - 方法论一致性审查报告

    ### 方法
    1. **提取关键发现**（从三个类别）：
       - 通读图像取证、数据完整性和方法论审查报告。
       - 找出最严重和置信度最高的发现。
       - 提取精确证据：具体内容、位置、置信度、支撑数据。
       - **执行交叉验证步骤**（见上方），剔除无工具支撑的发现。

    2. **计算总体风险评分**（修正加权标准）：
       - 图像取证：权重 30%（降权原因：AI 图像比对存在误报风险，工具阴性时如实评分）
       - 数据完整性：权重 55%（升权原因：统计检验结果客观可验证，误报率低）
       - 方法论一致性：权重 15%
       - 每维度按严重程度评 0-100 分。
       - 最终分数 = 加权总和。
       - 风险等级映射：0-15→无风险，16-35→低风险，36-55→中风险，56-75→高风险，76-100→严重风险。

       **关键评分原则 — 基于实际检测结果而非数据可用性**：
       - 数据完整性评分直接反映预计算检验中标记的异常数量和严重程度。
       - CRITICAL跨图匹配 → 90-100分；近等差数列标记 → 70-85分；
         末位数字严重偏好 → +15；高频重复值 → +15；Benford异常 → 60-80分。
       - **仅在确实所有检验（包括跨图比对、等差数列、末位数字、高频重复、
         Benford、GRIM、p值分布）全部阴性时，才评低分（0-20）**。
       - "无法执行检验"不再是评分理由——检验已由系统确定性执行。
         如果 PDF 文本中确实完全没有数值数据，标注为"PDF文本无可提取数值"
         而非"数据不足无法评估"。

       **各维度评分参考**：
       - 图像取证：工具检测到篡改证据→60-100；工具全部阴性→10-15；仅视觉判断无工具输出→10（无效证据）
       - 数据完整性：检测到造假证据（GRIM不一致/跨图重复/近等差/统计不一致）→60-100；
         仅透明度不足无法检验→20-40；未发现异常→0-15
       - 方法论一致性：发现严重矛盾→50-80；仅文本错误→30-50；无问题→0-15

    3. **未调查类别处理**（引用操纵、同行评审欺诈、产出异常）：
       - 在报告中添加"未调查"小节，说明原因。
       - 清晰标注需外部数据库/API 访问才能完成。

    4. **撰写中文执行摘要**（3-5 条要点）：
       - 仅聚焦实际调查的内容。
       - 每条一句话，清晰有力。

    5. **生成建议**：仅基于实际发现。

    6. **记录局限性**：诚实说明哪些未做，哪些需人工复核。

    ### 目标论文
    {paper_identifier}
