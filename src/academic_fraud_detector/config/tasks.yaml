      "total_checks": ...,
      "flagged_checks": ...
    }
  agent: methodology_consistency_reviewer
  context: [acquire_target_paper]

productivity_anomaly_investigation:
  description: >
    ## 任务：学术产出异常分析

    分析目标论文作者的发表模式，寻找"论文工厂"(paper mill) 式的量产型学术不端。

    **注意**：此任务依赖外部 API（PubMed/CrossRef/Semantic Scholar），
    仅在完整模式（非 local_only）下执行。如果 API 不可用，如实记录局限性。

    ### 方法

    1. **同组论文 Methods 雷同检测**：
       - 使用 `text_similarity_check` 工具（复用 text_similarity.py 的工具）
       - 提取目标论文的 Methods 段落
       - 搜索同作者的近期论文
       - 比对 Methods 段落的语义相似度
       - 如果多篇论文的 Methods 几乎完全相同（相似度 > 0.90），标记为可疑
       - 高度雷同的 Methods 可能是"模板化论文工厂"的标志

    2. **发表频率合理性分析**：
       - 使用 `publication_frequency_check` 工具
       - 按作者检索 PubMed/CrossRef 的发表记录
       - 计算每位作者的发表频率（论文数/年）
       - 标记条件：
         * 年均 >12 篇一作/通讯论文（几乎每月一篇，在实验学科中极不正常）
         * 同一年内发表多篇动物实验论文（动物实验周期长，不可能一年出很多篇）
         * 短期内期刊跳跃（从低分期刊突然跳到高分期刊，可能是通过造假提升）
       - 注意：不同学科的合理发表频率不同 — 理论学科可能较高

    3. **Salami Slicing 检测**：
       - 使用 `salami_slicing_check` 工具
       - Salami Slicing = 将一项完整研究切成多篇论文发表（最小可发表单元）
       - 检测方法：
         * 比对该作者的多篇论文：样本量是否相近？
         * 实验设计是否几乎相同只是换了干预条件？
         * 对照组数据是否完全相同？（一样的 control 数据出现在多篇论文中）
         * 论文标题是否高度相似？
       - 如果多篇论文有相同的对照组数据，这是极强的造假信号

    ### 目标论文
    {paper_identifier}
  expected_output: >
    JSON 格式报告（所有文本字段使用中文）：

    {
      "category": "productivity_anomaly",
      "severity": "无风险|低风险|中风险|高风险|严重风险",
      "confidence": "低|中|高",
      "summary": "中文叙述性总结",
      "methods_similarity": {
