synthesize_findings:
  description: >
    ## 任务：汇总所有调查结果并生成最终中文 Markdown 报告（完整模式）

    将全部五项专业调查的结果整合为一份全面、结构清晰、具有法律可辩护性的
    中文 Markdown 调查报告。这是最终交付物 — 决策者（期刊编辑、诚信官、
    学术委员会）将阅读并据此采取行动。

    ### 输入
    你将收到以下完整输出：
    - 抄袭调查报告
    - 图像取证调查报告
    - 数据完整性调查报告
    - 引用网络调查报告
    - 同行评审调查报告

    ### 方法
    1. **提取关键发现**（从每个类别）：
       - 通读每位专家的报告。
       - 找出最严重和置信度最高的发现。
       - 提取精确证据：具体内容、位置、置信度、支撑数据。

    2. **跨维度交叉验证**：
       - 同一作者名是否同时出现在引用圈和图像篡改标记中？
       - 数据造假和图像篡改是否同时出现？（两者并存提示系统性造假）
       - 抄袭发现中涉及的论文是否也在引用圈中？
       - 被标记的审稿人是否也是引用操纵的被标记者？
       - 跨类别关联是系统性造假的最强指标。

    3. **计算总体风险评分**（加权标准）：
       - 图像篡改：权重 25%（降权：AI图像比对存在误报风险）
       - 数据造假：权重 35%（升权：统计检验结果客观可验证）
       - 引用操纵：权重 15%
       - 同行评审欺诈：权重 10%
       - 方法论一致性：权重 10%
       - 产出异常：权重 5%
       - 每维度按严重程度评 0-100 分。
       - 最终分数 = 加权总和。
       - 风险等级：0-15→无风险，16-35→低风险，36-55→中风险，56-75→高风险，76-100→严重风险。

    4. **赋予总体置信度**：
       - 高：多个独立发现跨类别出现，证据一致。
       - 中：一个类别被强烈标记，或多个弱信号。
       - 低：仅弱信号、证据矛盾或显著数据局限性。

    5. **撰写中文执行摘要**（3-5 条要点）：面向期刊编辑和高校行政人员。

    6. **生成优先级建议**：严重风险→建议立即撤稿审查；高风险→建议正式调查等。

    7. **诚实记录局限性**：对法律可辩护性至关重要。

    ### 目标论文
    {paper_identifier}
  expected_output: >
    一份完整的中文 Markdown 格式调查报告。必须严格按照以下模板输出 ——
    这是一份面向中文母语读者的正式学术诚信调查报告。

    你必须输出纯 Markdown 文本（不是 JSON！不是代码块！），从 `#` 标题开始：

    ```
    # 学术诚信调查报告

    **报告编号**：INV-{timestamp}
    **调查日期**：{当前日期}
    **调查模式**：完整五维度调查
    **调查系统**：Academic Fraud Detection System (CrewAI)

    ---

    ## 被调查论文

    | 属性 | 内容 |
    |------|------|
    | **论文标题** | （标题） |
    | **作者** | （列出所有作者） |
    | **DOI** | （DOI） |
    | **期刊/会议** | （期刊名） |
    | **发表年份** | （年份） |

    ---

    ## 执行摘要

    1. （最重要的发现，一句话）
    2. （第二重要的发现，一句话）
    3. （跨维度关联发现，一句话）
    4. （总体评估，一句话）
    5. （主要局限性，一句话）

    ---

    ## 总体风险评估

    | 指标 | 结果 |
    |------|------|
    | **风险等级** | （无风险 / 低风险 / 中风险 / 高风险 / 严重风险） |
    | **风险评分** | （0-100 分） |
    | **置信度** | （高 / 中 / 低） |

    ### 评分方法

    | 调查维度 | 权重 | 得分 | 说明 |
    |----------|------|------|------|
    | 图像取证 | 30% | （分数） | （一句话） |
    | 数据完整性 | 30% | （分数） | （一句话） |
    | 引用操纵 | 15% | （分数） | （一句话） |
    | 同行评审 | 10% | （分数） | （一句话） |
    | 方法论一致性 | 10% | （分数） | （一句话） |
    | 产出异常 | 5% | （分数） | （一句话） |

    > **风险等级说明**：0-15 无风险 | 16-35 低风险 | 36-55 中风险 | 56-75 高风险 | 76-100 严重风险

    ---

    ## 调查发现

    ### 一、图像取证分析

    **严重程度**：（无 / 低 / 中 / 高 / 严重）
    **置信度**：（高 / 中 / 低）
    **分析图像总数**：（数字）
    **标记图像数**：（数字）

    #### 概述
    （叙述性总结）

    #### 详细发现
    （逐条列出每个被标记的图像，包含图编号、篡改类型、检测工具、置信度和详细说明）

    #### 跨图重复比对结果
    （列出所有重复配对及汉明距离）

    ---

    ### 二、数据完整性分析

    **严重程度**：（无 / 低 / 中 / 高 / 严重）
    **置信度**：（高 / 中 / 低）
    **提取数值总数**：（数字）

    #### 概述
    （叙述性总结）

    #### 本福特定律检验
    （表格呈现卡方、p 值、MAD、结论）

    #### p 值分布分析
    （表格呈现卡尺比率、均匀性检验、结论）

    #### GRIM 检验
    （表格呈现检验数量、不一致数量、结论，如有不一致逐条列出）

    #### 异常精度检测
    （CV 分析、末位偏好、显著性浓度）

    #### 统计一致性验证
    （表格呈现检验数量、不一致数量、结论）

    ---

    ### 三、引用网络分析

    **严重程度**：（无 / 低 / 中 / 高 / 严重）
    **置信度**：（高 / 中 / 低）

    #### 概述
    （叙述性总结）

    #### 作者自引分析
    （列出每位作者的自引率及判定）

    #### 引用图分析
    （节点数、边数、密度、引用圈数量、互惠配对数量）

    ---

    ### 四、同行评审审查

    **严重程度**：（无 / 低 / 中 / 高 / 严重）
    **置信度**：（高 / 中 / 低）

    #### 概述
    （叙述性总结）

    #### 审稿数据可用性
    （是否获取到公开审稿意见）

    #### 审稿文本分析 / 间接指标
    （视可用数据而定）

    ---

    ### 五、方法论一致性审查

    **严重程度**：（无 / 低 / 中 / 高 / 严重）
    **置信度**：（高 / 中 / 低）

    #### 概述
    （叙述性总结）

    #### 试剂/设备校验
    （列出校验结果：试剂型号是否存在、Cat# 格式是否正确、是否有编造的试剂编号）

    #### 伦理审批号校验
    （列出伦理审批号格式校验结果，各国格式是否符合规范）

    #### 实验时间线
    （实验周期 vs 投稿日期，是否存在时间冲突）

    #### Methods 内部自洽性
    （n 值声明、组数一致性、条件描述一致性等检查结果）

    ---

    ### 六、产出异常分析

    **严重程度**：（无 / 低 / 中 / 高 / 严重）
    **置信度**：（高 / 中 / 低）

    #### 概述
    （叙述性总结）

    #### 发表频率分析
    （作者/课题组发表频率是否异常）

    #### 多论文 Methods 雷同检测
    （同组论文的方法部分是否存在大量雷同）

    #### Salami Slicing 检测
    （是否存在将同一研究拆成多篇论文发表的情况）

    ---

    ## 跨维度关联分析

    （列出所有跨类别的关联发现。如"数据造假的作者 X 同样被图像取证标记，
    且其自引率达到 35%，提示可能存在系统性学术不端。"）

    如无特别关联，写"未发现不同调查维度之间的直接关联。"

    ---

    ## 建议

    1. **（优先级 1）**（具体行动建议）— 紧急性：（立即 / 常规 / 建议性）
       - 理由：（引用具体证据编号）
    2. **（优先级 2）**...
    3. ...

    ---

    ## 局限性声明

    1. （局限性 1）
    2. （局限性 2）
    3. 所有自动检测结果均需人工专家复核确认后方可作为正式证据。

    ---

    ## 证据清单

    | 编号 | 发现 | 位置 | 类别 | 置信度 |
    |------|------|------|------|--------|
    | EVID-001 | （具体发现） | （论文中位置） | （类别） | （高/中/低） |
    | EVID-002 | ... | ... | ... | ... |

    ---

