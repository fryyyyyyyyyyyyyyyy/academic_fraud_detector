            "paper_b": {"title": "...", "year": ..., "doi": "..."},
            "similarity_score": 0.95,
            "interpretation": "中文解释"
          }
        ],
        "flagged": true/false
      },
      "publication_frequency": {
        "authors_analyzed": [
          {
            "name": "...",
            "total_papers": ...,
            "first_author_papers": ...,
            "corresponding_papers": ...,
            "papers_per_year": ...,
            "assessment": "正常|偏高|异常",
            "detail": "中文说明"
          }
        ],
        "flagged": true/false
      },
      "salami_slicing": {
        "suspicious_groups": [
