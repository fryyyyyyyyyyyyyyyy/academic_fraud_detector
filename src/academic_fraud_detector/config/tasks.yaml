evidence_cross_validation:
  description: >
    ## 任务：证据语境交叉验证（LLM 回到论文中定位、解释、反证和串联）

    你要基于代码层已经产生的客观异常，把每条重要 evidence_id 放回论文正文、表格、图注和方法语境中审查。
    你的职责不是重新计算统计异常，也不是创造新的造假指控；你的职责是：定位、解释、反证、串联。

    ### 输入

    #### 论文全文/Markdown

    {local_paper_text}

    #### 论文 claim anchor（代码确定性抽取）

    {paper_claims_json}

    #### 原始数据确定性预检 JSON

    {raw_data_precheck_json}

    #### 确定性 evidence_id 列表

    {deterministic_evidence_json}

    #### 论文统计值 ↔ XLSX 候选对齐 seed

    {evidence_cross_validation_json}

    #### 可报告结论白名单

    {allowed_claims_json}

    ### 你的工作方式

    1. **定位**：对 high/critical/medium 的 evidence_id，优先从 paper_claims_json 中找可能对应的 Results、Table、Figure caption、Methods 位置；必要时在 local_paper_text 中引用短原文片段。
    2. **解释**：说明如果该异常确实对应论文核心结果，它如何增强或削弱风险判断。
    3. **反证**：主动寻找合理非造假解释，包括剂量梯度、时间点、编号、标准曲线、仪器固定精度、归一化、fold change、共享对照组或模板表格。
    4. **串联**：把数据异常与 n 值、组别、统计方法、Methods 描述、表格/图注联系起来。
    5. **分级处理**：每条 evidence_id 给出 contextual_verdict：keep / downgrade / human_review_only / not_linked_to_paper。

    ### 硬性边界

    - 你不能新增 raw_data_precheck_json 中不存在的客观统计异常。
    - 没有 evidence_id 的内容不能作为主要风险发现。
    - paper_claims_json 中的 claim 只是定位锚点，不是造假证据。
    - 如果 evidence_id 只能对应 ambiguous/no_candidate/unverifiable 的候选链路，默认应降级为 human_review_only，除非论文语境提供强支持。
    - 所有 LLM 知识性判断必须标注“需人工验证”。
    - 当前本地模式不做图像取证、图像 OCR、外部数据库检索或引用网络调查。

    ### 目标案例
    {paper_identifier}
  expected_output: >
    JSON 格式报告（所有文本字段必须使用中文）：

    {
      "category": "evidence_cross_validation",
      "summary": "2-5句中文总结，说明哪些 evidence_id 被论文语境支持、哪些被反证或降级",
      "reviews": [
        {
          "evidence_id": "E-0001",
          "linked_claim_ids": ["PCL-0004"],
          "paper_locations": [
            {"page": 3, "section": "Results", "excerpt": "论文原文短片段"}
          ],
          "xlsx_locations": [
            {"file_name": "...", "sheet": "...", "range": "..."}
          ],
          "contextual_verdict": "keep|downgrade|human_review_only|not_linked_to_paper",
          "supports_concern": true,
          "refutation_notes": ["可能的非造假解释或反证"],
          "reasoning": "解释为什么保留/降级/仅人工复核",
          "reporting_instruction": "可作为主要证据|仅作为人工复核|不要写成风险发现"
        }
      ],
      "cross_dimension_links": [
        {"evidence_id": "E-0001", "methodology_issue": "n值不一致", "detail": "..."}
      ],
      "limitations": ["无法从论文中定位的 evidence_id 应列出原因"]
    }
  agent: data_integrity_auditor
  context: [acquire_target_paper]

citation_network_investigation:
  description: >
    ## 任务：引用网络操纵调查

    调查目标论文及其作者的引用模式，寻找引用操纵的证据。

    ### 方法
    1. **获取引用数据**：通过 Semantic Scholar 获取完整参考文献列表和引文列表。

    2. **作者自引分析**：对每位作者计算自引率。标记自引率 > 25% 的作者。

    3. **构建引用图**：使用 `citation_graph_analyzer` 工具。

    4. **图分析**：引用圈检测（≥3 节点的强连通分量）、互惠引用对、异常密度、引用堆叠。

    5. **时间分析**（如数据可用）：引用突增、发表后短时间窗口内集中引用。

    6. **引用主张验证**（必须执行！利用 LLM 推理 + 联网搜索）：
       这是文献引用检测的核心 — 不需要付费 API 也能做：
       a) **随机抽查**：从论文中随机抽 3-5 个关键引用（支撑核心结论的引用）
       b) **联网验证**：使用 `academic_web_search` 或 `citation_existence_check` 工具
          搜索被引论文是否真实存在
       c) **LLM 推理判断**（极其重要！）：
          - 你拥有海量学术文献的训练知识，可以直接判断：
            * 这篇被引论文是否真的存在？
            * 该论文的研究方向与引用它的上下文是否一致？
            * 引用句中的数值/结论是否与你的知识一致？
          - 例如：如果论文声称"Smith et al. (2019) 报道了 RTA408 的抗氧化作用"，
            你应当判断：你是否知道这篇论文？该作者是否活跃在这个领域？
            这个年份发表这样的成果是否合理？
       d) **标记可疑引用**：
          - 搜索不到 → 可能是编造的引用（严重）
          - 搜索到但主题不相关 → 可能是为了凑引用数量（中等）
          - 搜索到且内容相关 → 引用有效

    7. **论文存在性检查**：
       - 检查所有参考文献中是否有明显的编造痕迹
       - 编造引文的常见特征：DOI 格式错误、作者名拼写不一致、
         期刊名与发表年份不匹配（如声称发表在 2020 年才创刊的期刊上）

    ### 目标论文
    {paper_identifier}
  expected_output: >
    JSON 格式报告（所有文本字段使用中文）：

    {
      "category": "citation_manipulation",
      "severity": "无风险|低风险|中风险|高风险|严重风险",
      "confidence": "低|中|高",
      "summary": "中文叙述性总结",
      "authors_analyzed": [{ "name": "...", "self_citation_rate": 0.35, "flagged": true }],
      "citation_graph": { "nodes": ..., "edges": ..., "citation_rings": [...], "ring_count": ... },
      "citation_claims_verified": {
        "total_checked": ...,
        "suspicious_count": ...,
        "findings": [
          {
            "claim": "原文中的引用句",
            "cited_paper": "被引论文信息",
            "web_search_result": "搜索结果摘要",
            "llm_reasoning": "基于你的知识判断该引用是否合理",
            "verdict": "有效|可疑|编造"
          }
        ]
      },
      "findings": [{ "detail": "中文详细描述", "severity": "..." }],
      "category_risk_score": 0-100, "total_checks": ..., "flagged_checks": ...
    }
  agent: citation_network_investigator
  context: [acquire_target_paper]

peer_review_investigation:
  description: >
    ## 任务：同行评审诚信调查

    调查目标论文的同行评审过程，寻找评审欺诈或诚信受损的证据。

    ### 方法
    1. **评估数据可用性**：检查是否有公开的审稿意见。如无可用的审稿文本，使用间接指标。

    2. **如审稿文本可用**：使用 `review_text_analyzer` 和 `review_template_detector` 分析审稿质量、
       检测模板复用和虚假审稿。

    3. **审稿人资质验证**（如审稿人身份已知）：检查发表记录、邮箱类型、领域相关性。

    4. **间接指标**（审稿数据不公开时）：期刊审稿政策、接收时间线、特刊风险、编辑利益冲突。

    5. **透明记录局限性**：明确说明因数据访问限制无法检查的内容。

    ### 目标论文
